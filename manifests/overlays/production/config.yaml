# zensur example config. Copy to config.yaml (or set ZENSUR_CONFIG=/path/to.yaml)
# and customize. Patterns shown here are placeholders.

# Global default normalization options. Each rule inherits these and can
# override any field individually. Built-in fallbacks (when both global and
# rule leave a field unset) are: case_insensitive=true, normalize_unicode=true,
# strip_marks=true, leet=false, collapse_repeats=false, fold_kana=false.
defaults:
  case_insensitive: true
  normalize_unicode: true   # NFKC (ÔĹāÔĹĀÔĹĄÔĹóÔĹŹÔĹíÔĹĄ ‚Üí badword)
  strip_marks: true         # defeats zalgo and combining-mark evasion
  leet: false               # 0‚Üío, 1‚Üíi, 3‚Üíe, 4‚Üía, 5‚Üís, 7‚Üít, @‚Üía, $‚Üís, !‚Üíi
  collapse_repeats: false   # "fuuuck" ‚Üí "fuck" (only collapses runs of 3+)
  fold_kana: true          # hiragana ‚ÜĒ katakana

# Used by the "warn" action and as the fallback when a rule's own notice is
# empty. Set notice_auto_delete_seconds to 0 to leave the notice in place.
notice: "Your message was removed."
notice_auto_delete_seconds: 8

# Used by the "replace" action when a rule's own replacement is empty.
replacement: "***"

# Rules are evaluated in order. Each rule has:
#   id          ‚ÄĒ unique identifier (used in logs and to look up notices)
#   patterns    ‚ÄĒ list of patterns; semantics depend on `mode`
#   mode        ‚ÄĒ substring | word | regex
#                   substring: matches anywhere (best for CJK / no whitespace)
#                   word:      matches only at letter/digit boundaries
#                              (best for English-like languages)
#                   regex:     RE2; matched against the normalized text
#   action      ‚ÄĒ log | delete | warn | replace
#                   replace requires the bot to have Manage Webhooks
#                   permission in the channel; falls back to a notice on error
#   notice      ‚ÄĒ per-rule override of the global notice (warn / replace
#                 fallback)
#   replacement ‚ÄĒ per-rule override of the global replacement (replace action)
#   allow       ‚ÄĒ phrases that suppress this rule when present in the
#                 normalized message (Scunthorpe-problem workaround)
# Plus any normalize option from `defaults` to override per-rule.
rules:
  # "„ÉĮ„Éõ„Éľ" ‚ÄĒ exhaustive coverage.
  #
  # Pipeline at match time (rule overrides + global defaults):
  #   1. NFKC                ‚ÄĒ ÔĹóÔĹĀÔĹąÔĹŹ‚Üíwaho, ÔĺúÔĺéÔĹį‚Üí„ÉĮ„Éõ„Éľ, ÔľĀ‚Üí!, ÔĹě‚Üí~
  #   2. strip combining marks ‚ÄĒ defeats zalgo
  #   3. case fold           ‚ÄĒ WAHO‚Üíwaho
  #   4. collapse runs of 3+ ‚ÄĒ „ÉĮ„Éõ„Éľ„Éľ„Éľ‚Üí„ÉĮ„Éõ„Éľ, wahoooo‚Üíwaho
  #   5. fold hiragana‚Üíkatakana ‚ÄĒ „āŹ„ĀĽ‚Üí„ÉĮ„Éõ
  #
  # After that, every kana variant of "wa-ho-<long>" reduces to „ÉĮ„Éõ followed
  # by one prolongation char; every romaji variant reduces to "wah" + at
  # least one long-o representative.
  #
  # Known evasions NOT caught: homoglyph swaps (Cyrillic –į/Greek őŅ), inserted
  # whitespace/punctuation between letters. Add separate rules if needed.

  - id: waho-kana
    # [„ÉĮ„Éģ]„Éõ followed by one or more of:
    #   „Éľ  U+30FC katakana-hiragana prolonged sound mark
    #   ÔĹį   U+FF70 halfwidth (also NFKC‚Üí„Éľ, kept for safety)
    #   „ā™„ā¶ explicit spell-out of long /oňź/
    #   -   ASCII hyphen-minus (also catches NFKC of fullwidth Ôľć)
    #   ~   ASCII tilde         (also catches NFKC of fullwidth ÔĹě)
    #   „Äú  U+301C wave dash
    #   ‚Äź‚ÄĎ‚Äí‚Äď‚ÄĒ‚Äē various Unicode dashes (U+2010..U+2015)
    patterns:
      - '[„ÉĮ„Éģ]„Éõ[„ÉľÔĹį„ā™„ā¶\-~„Äú‚Äź‚ÄĎ‚Äí‚Äď‚ÄĒ‚Äē]+'
    mode: regex
    action: delete
    collapse_repeats: true   # „ÉĮ„Éõ„Éľ„Éľ„Éľ ‚Üí „ÉĮ„Éõ„Éľ, „ÉĮ„Éõ„ā™„ā™ ‚Üí „ÉĮ„Éõ„ā™
    # fold_kana is on globally (defaults), so „āŹ„ĀĽ„Éľ / „Éģ„ĀĽ„Éľ all fold here.

  - id: waho-romaji
    # wah followed by one or more long-o representatives, optional trailing h.
    # Macron (Ňć) and circumflex (√ī) variants are composed runes after NFKC, so
    # they must appear literally in the class.
    patterns:
      - 'wah[oŇć√ī√≤√≥√∂uŇę]+h?'
    mode: regex
    action: delete
    collapse_repeats: true   # wahooooo ‚Üí waho
